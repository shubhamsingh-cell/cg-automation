services:
  - type: web
    name: cg-automation-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CG_ADMIN_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
